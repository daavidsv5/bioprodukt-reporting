name: Aktualizace dat

on:
  schedule:
    - cron: '0 5 * * *'   # každý den v 6:00 SEČ (= 5:00 UTC)
  workflow_dispatch:        # možnost spustit ručně z GitHubu

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Aktualizuj data
        run: node scripts/updateData.js

      - name: Commit a push změn
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: automatická aktualizace dat $(date +'%Y-%m-%d')"
          git push
