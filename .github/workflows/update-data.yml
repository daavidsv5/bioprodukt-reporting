name: Aktualizace dat

on:
  schedule:
    - cron: '0 3 * * *'   # každý den cca v 6:00 SELČ — cron spouštíme v 3:00 UTC kvůli typickému zpoždění GitHub Actions (2–4 h)
  workflow_dispatch:        # možnost spustit ručně z GitHubu

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Aktualizuj data
        run: node scripts/updateData.js

      - name: Commit a push změn
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: automatická aktualizace dat $(date +'%Y-%m-%d')"
          git push

      - name: Trigger Vercel deploy
        run: curl -X POST https://api.vercel.com/v1/integrations/deploy/prj_PhOujoycF6FwoXKv0StUwwHDRML4/dSmEgTC693
